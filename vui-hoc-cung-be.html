<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">

<title>Vui Học Cùng Bé</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;padding:0;font-family:-apple-system,system-ui,'Segoe UI',Tahoma,sans-serif;font-size:16px;color:#1F2937;min-height:100vh;-webkit-text-size-adjust:100%;overflow-x:hidden;position:relative}
body{background:linear-gradient(135deg,#FFE7F4 0%,#E5F4FF 50%,#FFF7D6 100%);background-size:400% 400%;animation:bgShift 20s ease infinite;transition:background .5s}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
body.theme-princess{background:linear-gradient(135deg,#FFD1E8,#F8B4E0,#FFE7F4,#FFD0E8,#FFF7D6);background-size:400% 400%;animation:bgShift 18s ease infinite}
body.theme-blocky{background:linear-gradient(135deg,#06B6D4,#3B82F6,#10B981,#06B6D4);background-size:400% 400%;animation:bgShift 14s ease infinite}
body.theme-blocky::before{content:'';position:fixed;inset:0;background-image:linear-gradient(45deg,transparent 48%,rgba(255,255,255,.06) 49%,rgba(255,255,255,.06) 51%,transparent 52%),linear-gradient(-45deg,transparent 48%,rgba(255,255,255,.06) 49%,rgba(255,255,255,.06) 51%,transparent 52%);background-size:40px 40px;animation:gridMv 25s linear infinite;z-index:0;pointer-events:none}
@keyframes gridMv{from{background-position:0 0}to{background-position:80px 80px}}
.bg-scene{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-scene .float-emoji{position:absolute;font-size:24px;opacity:.7;animation:floatUp linear infinite;will-change:transform}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0);opacity:0}10%{opacity:.8}90%{opacity:.6}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}
.bg-scene .twinkle{position:absolute;width:8px;height:8px;background:white;border-radius:50%;box-shadow:0 0 12px white,0 0 20px rgba(255,200,230,.8);animation:twk 2.5s ease-in-out infinite}
@keyframes twk{0%,100%{opacity:.3;transform:scale(.6)}50%{opacity:1;transform:scale(1.3)}}
.bg-scene .pixel{position:absolute;animation:pxFall linear infinite;will-change:transform;border-radius:2px}
@keyframes pxFall{0%{transform:translateY(-30px) rotate(0);opacity:0}10%{opacity:.8}90%{opacity:.6}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}
.bg-scene .glow{position:absolute;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.3),transparent 70%);animation:pulseGlow 4s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{transform:scale(.7);opacity:.3}50%{transform:scale(1.3);opacity:.6}}
.bg-scene .castle{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:340px;opacity:.18;z-index:0;pointer-events:none}
.bg-scene .floater{position:absolute;animation:floatLR linear infinite;will-change:transform;opacity:.85}
@keyframes floatLR{0%{transform:translateX(-100px) translateY(0);opacity:0}10%{opacity:.85}50%{transform:translateX(50vw) translateY(-30px)}90%{opacity:.75}100%{transform:translateX(110vw) translateY(0);opacity:0}}
.bouncer{animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.app{position:relative;z-index:5}
button,input{font-family:inherit;font-size:inherit;border:none;cursor:pointer;-webkit-appearance:none}
button{min-height:44px}
.app{max-width:780px;margin:0 auto;padding:16px;min-height:100vh}
h1{font-size:24px;font-weight:600;color:#6B46C1;text-align:center;margin:0 0 8px}
h2{font-size:18px;font-weight:500;color:#6B46C1;margin:0}
.sub{text-align:center;color:#6B7280;font-size:14px;margin:0 0 16px}
/* Profile cards */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.pcard{position:relative;padding:20px;color:white;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.12);transition:transform .15s;overflow:hidden}
.pcard:active{transform:scale(.97)}
.pcard.princess{background:linear-gradient(135deg,#F472B6,#EC4899,#D946EF);border-radius:24px}
.pcard.blocky{background:linear-gradient(135deg,#06B6D4,#3B82F6,#10B981);border-radius:12px;border:3px solid #fff}
.pcard.princess::before{content:'✨';position:absolute;top:8px;right:10px;font-size:22px;animation:tw 1.5s infinite}
.pcard.princess::after{content:'💖';position:absolute;bottom:10px;left:10px;font-size:18px;animation:tw 2s infinite .5s}
@keyframes tw{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
.pcard .av{font-size:48px;line-height:1}
.pcard .nm{font-size:20px;font-weight:600;margin:4px 0 0;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.pcard .gr{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.9}
.pcard .tg{font-size:9px;background:rgba(0,0,0,.25);padding:3px 9px;border-radius:99px;margin-top:6px;text-transform:uppercase;letter-spacing:.4px}
/* Bar */
.bar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.85);border-radius:14px;padding:8px 12px;margin-bottom:10px;font-size:13px;flex-wrap:wrap;gap:6px;min-height:54px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:99px;font-weight:500;font-size:13px;background:#A678FF;color:white}
.btn.gray{background:#E5E7EB;color:#374151}
.btn:active{opacity:.8}
.namebar{text-align:center;line-height:1.2;flex:1;min-width:0}
.namebar .nm{font-weight:600;font-size:14px;color:#6B46C1}
.namebar .gr{font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:.4px}
.streak{display:inline-flex;align-items:center;gap:3px;padding:7px 11px;border-radius:99px;font-weight:600;font-size:13px;background:linear-gradient(90deg,#FB923C,#F43F5E);color:white}
.coins{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(90deg,#FFD93D,#FBBF24);color:#92400E;padding:7px 11px;border-radius:99px;font-weight:600;font-size:13px}
/* Subjects */
.subjs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.scard{padding:18px 10px;color:white;font-weight:600;border-radius:18px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08);transition:transform .15s}
.scard:active{transform:scale(.96)}
.scard .e{font-size:32px}
.scard .ct{font-size:15px;margin:0}
.scard .cd{font-size:11px;opacity:.9}
/* Topic list */
.section-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:white}
.section-row{display:flex;align-items:center;gap:8px;margin:14px 0 6px;flex-wrap:wrap}
.section-hint{font-size:11px;color:#6B7280}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.topic{position:relative;background:white;border:2px solid rgba(255,217,61,.4);border-radius:16px;padding:14px;text-align:left;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.06);transition:all .15s;color:#1F2937}
.topic:active{transform:scale(.97)}
.topic.adv{border:2px solid #FB923C;background:linear-gradient(to bottom right,white,#FFF7ED)}
.topic.next{border:2px solid #93C5FD;background:linear-gradient(to bottom right,#EFF6FF,#EEF2FF)}
.topic .badge{position:absolute;top:-8px;right:-6px;color:white;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.topic .badge.adv{background:linear-gradient(90deg,#F97316,#EF4444)}
.topic .badge.exam{background:linear-gradient(90deg,#7C3AED,#EC4899)}
.topic .e{font-size:30px;display:block}
.topic .t{font-size:14px;font-weight:600;color:#6B46C1;margin:4px 0 2px}
.topic .d{font-size:11px;color:#6B7280;margin:0 0 4px}
.topic .h{font-size:10px;font-weight:500;color:#FF6FB5}
/* Panel + Quiz */
.panel{background:white;border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
.qe{font-size:54px;display:block;text-align:center;margin:8px 0}
.qp{font-size:18px;font-weight:500;color:#6B46C1;margin:8px 0;text-align:center;line-height:1.5;white-space:pre-line}
.speaker{background:linear-gradient(135deg,#4DC3FF,#A678FF);color:white;border-radius:50%;width:42px;height:42px;display:inline-flex;align-items:center;justify-content:center;font-size:18px;margin:6px}
.speaker:active{opacity:.85}
.speaker.playing{animation:pls 1.2s infinite}
@keyframes pls{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.qrow{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
@media (max-width:380px){.choices{grid-template-columns:1fr}}
.choice{background:linear-gradient(135deg,#4DC3FF,#A678FF);color:white;border-radius:14px;padding:14px 12px;font-size:15px;font-weight:500;text-align:center;line-height:1.4;min-height:54px;display:flex;align-items:center;justify-content:center}
.choice:active:not(.disabled){transform:scale(.97)}
.choice.correct{background:linear-gradient(135deg,#6BE38E,#10B981)}
.choice.wrong{background:linear-gradient(135deg,#FB7185,#E11D48)}
.choice.dim{background:#E5E7EB;color:#9CA3AF}
/* Kid Login keypad */
.pindot{width:18px;height:18px;border-radius:50%;transition:background .2s,transform .2s;animation:pop .3s}
@keyframes pop{from{transform:scale(.6)}to{transform:scale(1)}}
.numkey:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12),0 3px 6px rgba(0,0,0,.08)!important}
.numkey:hover{filter:brightness(1.05)}
/* Mini button trong Parent Panel */
.mini-btn:active{transform:scale(.95)}
.explain{margin-top:14px;border-left:4px solid #FFD93D;background:rgba(255,217,61,.2);border-radius:10px;padding:12px}
.explain .t{font-size:11px;font-weight:600;color:#92400E;margin:0 0 4px}
.explain .b{font-size:14px;color:#374151;line-height:1.5;margin:0}
/* Lesson */
.step{display:flex;align-items:flex-start;gap:10px;background:rgba(255,217,61,.3);border-radius:14px;padding:11px;margin-bottom:6px;animation:slI .4s}
@keyframes slI{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.step .n{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#FF6FB5;color:white;font-weight:600;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.step .s{font-size:14px;font-weight:500;color:#374151;line-height:1.5}
.answer-box{margin-top:8px;background:linear-gradient(90deg,#6BE38E,#10B981);color:white;border-radius:14px;padding:9px 18px;font-size:18px;font-weight:600;display:inline-block}
.lesson-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:14px}
.btn-go{background:linear-gradient(90deg,#FF6FB5,#A678FF);color:white;border-radius:99px;padding:13px 26px;font-weight:600;font-size:15px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(255,111,181,.4)}
.btn-skip{background:white;color:#6B46C1;border-radius:99px;padding:11px 18px;font-weight:600;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
/* Result */
.result{text-align:center;background:white;border-radius:22px;padding:24px;max-width:340px;margin:30px auto;box-shadow:0 10px 24px rgba(0,0,0,.1)}
.result .e{font-size:60px;display:block}
.result .s{font-size:36px;font-weight:600;color:#FF6FB5;margin:5px 0}
.result .m{font-size:14px;color:#374151;margin-bottom:8px}
.points-earn{background:linear-gradient(90deg,#FFD93D,#FBBF24);color:#92400E;border-radius:14px;padding:10px 18px;display:inline-block;margin:8px 0}
.points-earn .big{font-size:22px;font-weight:600;display:block}
.points-earn .sm{font-size:11px;font-weight:500}
/* Progress bar */
.progress{height:8px;background:rgba(255,255,255,.7);border-radius:99px;overflow:hidden;margin-bottom:12px}
.progress>div{height:100%;background:linear-gradient(90deg,#FF6FB5,#FFD93D,#6BE38E);transition:width .4s}
/* Celebrate */
.celebrate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:100}
.particle{position:absolute;width:12px;height:12px;opacity:0;animation:burst .9s ease-out forwards}
.particle.round{border-radius:50%}
@keyframes burst{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--x),var(--y)) scale(1.3) rotate(180deg);opacity:0}}
.sticker{padding:18px 32px;box-shadow:0 14px 36px rgba(0,0,0,.2);text-align:center;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);background:rgba(255,255,255,.97)}
.sticker.princess{border-radius:24px;border:4px solid #F472B6}
.sticker.blocky{border-radius:10px;border:4px solid #06B6D4}
.sticker .se{font-size:54px;display:block}
.sticker .st{font-size:18px;font-weight:600;margin:0}
.sticker.princess .st{color:#9D174D}
.sticker.blocky .st{color:#1E40AF}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ach-modal{background:linear-gradient(135deg,#FFD93D,#FBBF24,#F97316,#EC4899);color:white;border-radius:26px;padding:24px;max-width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.ach-modal h2{font-size:20px;margin:0 0 12px;color:white;text-shadow:0 2px 6px rgba(0,0,0,.2)}
.ach-item{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.95);border-radius:16px;padding:14px;color:#92400E;text-align:left;margin-bottom:10px}
.ach-item .ae{font-size:42px}
.ach-item .at{font-size:15px;font-weight:600;color:#6B46C1;margin:0}
.ach-item .ad{font-size:11px;color:#6B7280;margin:2px 0 0}
.ach-modal .closebtn{background:white;color:#6B46C1;border-radius:99px;padding:11px 24px;font-weight:600;font-size:14px}
/* Tip */
.tip{background:rgba(255,255,255,.7);border-left:4px solid #A678FF;padding:10px 14px;border-radius:10px;font-size:12px;color:#374151;margin:10px 0;line-height:1.5}
.footer{text-align:center;font-size:11px;color:#9CA3AF;margin:20px 0 8px;padding:0 8px}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
(function(){
const root=document.getElementById('app');
const LS={get:(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

// ==== One-time migration: ×5 xu hiện có để bù lại giá quà tăng ====
if(!LS.get('migration_5x_v1',false)){
  ['vy','lam'].forEach(p=>{
    const c=LS.get('coins_'+p,0);
    if(c>0)LS.set('coins_'+p,c*5);
  });
  LS.set('migration_5x_v1',true);
}

// ==== State persisted ====
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const getStreak=p=>LS.get('streak_'+p,{cur:0,last:''});
const setStreak=(p,v)=>LS.set('streak_'+p,v);
const getCoins=p=>LS.get('coins_'+p,0);
const setCoins=(p,v)=>LS.set('coins_'+p,v);
const getAch=p=>LS.get('ach_'+p,[]);
const setAch=(p,v)=>LS.set('ach_'+p,v);
const getTotalCorrect=p=>LS.get('totalCorrect_'+p,0);
const setTotalCorrect=(p,v)=>LS.set('totalCorrect_'+p,v);

// Streak: tăng 1 lần/ngày
function checkInToday(p){
  const today=todayStr();
  const s=getStreak(p);
  if(s.last===today)return s.cur;
  // Tính gap
  let cur=1;
  if(s.last){
    const da=new Date(s.last+'T00:00:00');const db=new Date(today+'T00:00:00');
    const gap=Math.round((db-da)/86400000);
    if(gap===1)cur=s.cur+1;
  }
  setStreak(p,{cur,last:today});
  return cur;
}

// ==== Themes ====
const THEMES={
  princess:{id:'princess',label:'Công chúa',avatar:'👸',
    stickers:['✨','💖','🌸','👑','🦄','🌟','💎','🦋'],
    praises:['Công chúa giỏi quá! 👑','Tuyệt vời! ✨','Đẹp lắm! 💖','Lấp lánh! 🌟','Magic! 🦄'],
    particles:['#FF6FB5','#F472B6','#EC4899','#FBBF24','#A78BFA','#FB7185'],
    shape:'round',color:'#9D174D'},
  blocky:{id:'blocky',label:'Khối Game',avatar:'🎮',
    stickers:['🎮','🤖','⚡','🏆','🎯','💎','🚀','🧱'],
    praises:['Đỉnh cao! 🎮','Level up! ⚡','Thắng rồi! 🏆','Pro! 🚀','Cool! 💎'],
    particles:['#06B6D4','#3B82F6','#10B981','#FBBF24','#F97316','#EF4444'],
    shape:'square',color:'#1E40AF'}
};

// ==== Profiles ====
const PROFILES={
  vy:{name:'Phương Vy',grade:'Lớp 2',gradeNext:'Lớp 3',theme:'princess'},
  lam:{name:'Thành Lâm',grade:'Lớp 4',gradeNext:'Lớp 5',theme:'blocky'}
};

// ==== Helpers ====
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
const numChoices=(c,sp)=>{sp=sp||5;const s=new Set([c]);while(s.size<4){const d=rand(-sp,sp);if(c+d>=0&&c+d!==c)s.add(c+d)}const ch=shuffle([...s]).map(String);return{choices:ch,answerIndex:ch.indexOf(String(c))}};

// ==== Topics ====
// Lớp 2 (Phương Vy)
const TOPICS_VY={
  math:[
    // === HỌC PHẦN 1 — Bài 1.1 → 3.3 (Cơ bản) ===
    {id:'v2-1.1',e:'🔢',t:'Hàng trăm-chục-đơn vị',d:'Giá trị chữ số (số đến 1000)',
     ex:[{p:'Số 327 có giá trị chữ số 3 là?',steps:['327 = 300 + 20 + 7','Chữ số 3 ở hàng trăm.','Giá trị: 300.'],a:'300'}],
     gen:()=>{const o=[];for(let i=0;i<5;i++){const h=rand(1,9),t=rand(0,9),u=rand(1,9);const n=h*100+t*10+u;const pos=rand(0,2);const dig=[u,t,h][pos];const val=[u,t*10,h*100][pos];const ans=String(val);const ds=new Set([ans]);[u,t*10,h*100].forEach(v=>{if(String(v)!==ans)ds.add(String(v))});while(ds.size<4)ds.add(String(rand(1,9)*[1,10,100][rand(0,2)]));const ch=shuffle([...ds]).slice(0,4);if(!ch.includes(ans))ch[0]=ans;o.push({prompt:`Số ${n} có giá trị chữ số ${dig} là?`,choices:ch,answerIndex:ch.indexOf(ans),explanation:`${n} = ${h*100}+${t*10}+${u}. Chữ số ${dig} ở hàng ${pos===2?'trăm':pos===1?'chục':'đơn vị'} → ${val}.`})}return o}},
    {id:'v2-1.2',e:'⚖️',t:'So sánh số đến 1000',d:'Digit-by-digit (>, <, =)',
     ex:[{p:'872 ___ 782',steps:['So hàng trăm: 8 > 7.','872 > 782.'],a:'>'}],
     gen:()=>{const o=[];for(let i=0;i<5;i++){const a=rand(100,999),b=rand(100,999);const c=a>b?'>':a<b?'<':'=';const ch=shuffle(['>','<','=']);o.push({prompt:`Điền dấu: ${a} ___ ${b}`,choices:ch,answerIndex:ch.indexOf(c),explanation:`${a} ${c} ${b}.`})}return o}},

// Tìm topic theo id (từ math/english/vietnamese)
function findTopicById(profile,id){
  const T=profile==='vy'?TOPICS_VY:TOPICS_LAM;
  for(const subj of ['math','english','vietnamese']){
    const t=(T[subj]||[]).find(x=>x.id===id);
    if(t)return t;
  }
  return null;
}

// Tính tiến độ giai đoạn từ attempts log
function getPhaseProgress(profile,phase){
  const attempts=getAttempts(profile);
  const done=phase.topics.filter(tid=>attempts.some(a=>a.tid===tid)).length;
  const total=phase.topics.length;
  const correctCount=attempts.filter(a=>phase.topics.includes(a.tid)).reduce((s,a)=>s+(a.c||0),0);
  const wrongCount=attempts.filter(a=>phase.topics.includes(a.tid)).reduce((s,a)=>s+(a.w||0),0);
  const acc=correctCount+wrongCount>0?Math.round(correctCount*100/(correctCount+wrongCount)):0;
  return {done,total,pct:total?Math.round(done*100/total):0,acc,correct:correctCount,wrong:wrongCount};
}

// Build topic-shape exam for a phase (tổng hợp 30 câu trộn từ tất cả chủ đề)
function buildPhaseExam(profile,phase){
  const tops=phase.topics.map(id=>findTopicById(profile,id)).filter(Boolean);
  return {
    id:'exam-'+phase.id,
    e:'📝',t:`Kiểm tra ${phase.name}`,
    d:`Tổng hợp ${tops.length} chủ đề · 30 câu trộn`,
    examFlag:true,
    ex:[{p:`Đây là bài kiểm tra ${phase.name}. Cố lên!`,steps:[`Bao gồm ${tops.length} chủ đề bạn đã học trong giai đoạn.`,'Mỗi câu rút ngẫu nhiên từ kho câu hỏi.','Bấm "Mình hiểu rồi" để bắt đầu.'],a:'Sẵn sàng làm bài!'}],
    gen:()=>{const all=[];tops.forEach(t=>{try{all.push(...t.gen())}catch(e){}});return shuffle(all)}
  };
}

  {id:'streak3',e:'🔥',t:'Bền bỉ 3 ngày',d:'Học liên tiếp 3 ngày',check:p=>getStreak(p).cur>=3},

function checkUnlocks(p){
  const unlocked=getAch(p);const newly=[];
  ACH.forEach(a=>{if(!unlocked.includes(a.id)&&a.check(p)){unlocked.push(a.id);newly.push(a)}});
  if(newly.length>0)setAch(p,unlocked);
  return newly;
}

// ==== Speech ====
const speak=(text,lang,btn)=>{
  if(!('speechSynthesis' in window)){alert('Trình duyệt không hỗ trợ đọc giọng nói');return}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang||'vi-VN';u.rate=lang==='en-US'?0.85:0.95;
  if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');u.onerror=()=>btn.classList.remove('playing')}
  window.speechSynthesis.speak(u);
};

  color=color||'#EC4899';

  const units=num%10;
  let html='<div style="display:inline-flex;align-items:flex-end;gap:3px;flex-wrap:wrap;justify-content:center;max-width:180px">';
  // Thanh chục (vertical bar chia 10 đoạn)

    for(let j=1;j<10;j++)lines+=`<line x1="2" y1="${j*5.4}" x2="14" y2="${j*5.4}" stroke="#1F2937" stroke-width="0.6"/>`;

  }
  // Ô đơn vị (square nhỏ)
  if(units>0){
    html+='<div style="display:inline-flex;flex-wrap:wrap;width:54px;align-self:flex-end;gap:2px;margin-left:4px">';
    for(let i=0;i<units;i++){

}

  size=size||90;color=color||'#EC4899';
  const r=42,cx=50,cy=50;
  if(denom===1){return `<svg viewBox="0 0 100 100" width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${numer>=1?color:'#F3F4F6'}" stroke="#1F2937" stroke-width="2"/></svg>`}
  let slices='';
  for(let i=0;i<denom;i++){
    const startA=(i/denom)*2*Math.PI-Math.PI/2;
    const endA=((i+1)/denom)*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
    const x2=cx+r*Math.cos(endA),y2=cy+r*Math.sin(endA);
    const largeArc=(endA-startA)>Math.PI?1:0;
    const fill=i<numer?color:'#F3F4F6';
    slices+=`<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${fill}" stroke="#1F2937" stroke-width="1.5"/>`;
  }
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">${slices}</svg>`;
}

// ==== Vẽ đồng hồ analog SVG ====
// time: chuỗi "h:mm" (vd "3:30") → trả về SVG đầy đủ
function clockSVG(time,size){
  size=size||190;
  const [hStr,mStr]=time.split(':');
  const h=parseInt(hStr,10),m=parseInt(mStr,10);
  const ma=m*6,ha=(h%12)*30+m*0.5;
  const polar=(d,r)=>{const rad=(d-90)*Math.PI/180;return[100+r*Math.cos(rad),100+r*Math.sin(rad)]};
  const [mx,my]=polar(ma,70),[hx,hy]=polar(ha,50);
  let ticks='';
  for(let i=0;i<12;i++){
    const a=i*30,[a1,b1]=polar(a,78),[a2,b2]=polar(a,88);
    ticks+=`<line x1="${a1}" y1="${b1}" x2="${a2}" y2="${b2}" stroke="#A678FF" stroke-width="3" stroke-linecap="round"/>`;
  }
  // Số 1-12 quanh mặt đồng hồ
  let nums='';
  for(let n=1;n<=12;n++){
    const [nx,ny]=polar(n*30,62);
    nums+=`<text x="${nx}" y="${ny}" text-anchor="middle" font-weight="700" font-size="14" fill="#6B46C1" dominant-baseline="middle">${n}</text>`;
  }
  return `<svg viewBox="0 0 200 200" width="${size}" height="${size}" style="display:block;margin:6px auto;max-width:100%">
    <circle cx="100" cy="100" r="92" fill="#FFF7D6" stroke="#A678FF" stroke-width="6"/>
    ${ticks}
    ${nums}
    <line x1="100" y1="100" x2="${hx}" y2="${hy}" stroke="#1F2937" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="${mx}" y2="${my}" stroke="#FF6FB5" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="5" fill="#1F2937"/>
  </svg>`;
}

  return true;
}
// Số câu/session — gọi gen() nhiều lần ghép lại để có 30 câu/lượt
const QPS=30;
function buildQuestions(top){
  // Dedupe: gọi gen() nhiều lần, chỉ giữ câu có prompt+choices KHÁC nhau
  const out=[],seen=new Set();
  let safe=0;
  while(out.length<QPS&&safe<60){
    safe++;
    let added=false;
    for(const q of top.gen()){
      const key=q.prompt+'§'+(q.choices||[]).join('|');
      if(!seen.has(key)){seen.add(key);out.push(q);added=true;if(out.length>=QPS)break}
    }
    // Nếu sau 10 vòng không thêm được câu mới → ngân hàng cạn, dùng những gì có
    if(!added&&safe>10)break;
  }
  // Nếu vẫn chưa đủ 30 (ngân hàng nhỏ), shuffle những câu đã có và lặp lại để đủ số
  if(out.length<QPS&&out.length>0){
    const base=out.slice();
    while(out.length<QPS){out.push(base[out.length%base.length])}
  }
  return out.slice(0,QPS);
}

function getDailyStats(p,days){
  const out=[];const today=new Date();
  for(let i=days-1;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const att=getAttempts(p).filter(a=>a.d===ds);
    const c=att.reduce((s,a)=>s+(a.c||0),0),w=att.reduce((s,a)=>s+(a.w||0),0);
    out.push({d:ds,c,w,total:c+w,acc:c+w>0?Math.round(c/(c+w)*100):0,topics:att.length});
  }
  return out;
}
// Phân tích window N ngày
function analyzeProgress(p,days){
  const cutoff=new Date(Date.now()-days*86400000).toISOString().slice(0,10);
  const list=getAttempts(p).filter(a=>a.d>=cutoff);
  const c=list.reduce((s,a)=>s+(a.c||0),0);
  const w=list.reduce((s,a)=>s+(a.w||0),0);
  const tot=c+w;const acc=tot?Math.round(c/tot*100):0;
  const bySubj={};['math','english','vietnamese'].forEach(s=>{const sl=list.filter(a=>a.s===s);const sc=sl.reduce((x,a)=>x+a.c,0),sw=sl.reduce((x,a)=>x+a.w,0),st=sc+sw;bySubj[s]={t:st,acc:st?Math.round(sc/st*100):0}});
  const byTopic={};list.forEach(a=>{if(!byTopic[a.tid])byTopic[a.tid]={tn:a.tn,s:a.s,c:0,w:0};byTopic[a.tid].c+=a.c;byTopic[a.tid].w+=a.w});
  const weakest=Object.values(byTopic).filter(t=>t.c+t.w>=2).sort((a,b)=>(a.c/(a.c+a.w))-(b.c/(b.c+b.w))).slice(0,2);
  return {sessions:list.length,total:tot,correct:c,wrong:w,acc,bySubj,weakest};
}

  const visible=REWARDS.filter(r=>!r.for||r.for===p);

  let prevTier=null;
  const list=visible.map(r=>{

    return header+(()=>{
    const canAfford=coins>=r.cost;
    const need=r.cost-coins;
    const pct=Math.min(100,Math.round(coins/r.cost*100));
    return `<div style="background:white;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 4px 12px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center;border-left:5px solid ${tier(r.cost)}">
      <span style="font-size:42px;flex-shrink:0">${r.e}</span>
      <div style="flex:1;min-width:0">
        <p style="margin:0;font-size:14px;font-weight:600;color:#1F2937">${r.name}</p>
        <p style="margin:2px 0 6px;font-size:11px;color:#6B7280;line-height:1.4">${r.desc}</p>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="background:${tier(r.cost)};color:white;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600">${r.cost} 🪙</span>
          ${canAfford
            ? `<button class="redeem-btn" data-id="${r.id}" style="background:linear-gradient(90deg,#10B981,#059669);color:white;border:none;border-radius:99px;padding:6px 14px;font-weight:600;cursor:pointer;font-family:inherit;font-size:11px">✨ Đổi ngay</button>`
            : `<span style="font-size:11px;color:#9CA3AF">Còn thiếu <strong style="color:#EF4444">${need} 🪙</strong></span>`}
        </div>
        ${!canAfford?`<div style="height:5px;background:#F3F4F6;border-radius:99px;overflow:hidden;margin-top:6px"><div style="height:100%;background:${tier(r.cost)};width:${pct}%;transition:width .4s"></div></div>`:''}
      </div>
    </div>`;})();
  }).join('');
  const pendingHtml=pending.length>0?`<div style="background:#FEF3C7;border-left:4px solid #F59E0B;border-radius:10px;padding:10px;margin-bottom:10px">
    <p style="margin:0 0 6px;font-size:11px;font-weight:600;color:#92400E">⏳ Quà đang chờ bố/mẹ trao (${pending.length})</p>
    ${pending.map(r=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#374151;margin:4px 0"><span>${r.emoji}</span><span style="flex:1">${r.name}</span><span style="color:#92400E;font-weight:600">−${r.cost} 🪙</span></div>`).join('')}
  </div>`:'';
  root.innerHTML=`<div class="bar">
    <div class="btn gray" id="back">← Quay</div>
    <div class="namebar" style="display:flex;align-items:center;gap:8px;justify-content:center"><div class="bouncer">${avatar}</div><div><p class="nm">${info.name}</p><p class="gr">Cửa hàng quà</p></div></div>
    <button class="btn gray" id="parentBtn" style="font-size:11px">🔒 Bố/Mẹ</button>
  </div>
  <div style="background:linear-gradient(135deg,#FFD93D,#FBBF24,#FF6FB5);border-radius:18px;padding:16px;text-align:center;color:white;box-shadow:0 8px 22px rgba(0,0,0,.15);margin-bottom:12px">
    <p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.95">🪙 Ví xu của bé</p>
    <p style="margin:4px 0 0;font-size:42px;font-weight:600;text-shadow:0 2px 6px rgba(0,0,0,.2)">${coins}</p>
  </div>
  ${pendingHtml}
  <p style="font-size:11px;color:#6B7280;text-align:center;margin:8px 0 10px">Học chăm — kiếm xu — đổi quà 🎁</p>
  ${list}
  <p style="font-size:10px;color:#9CA3AF;text-align:center;margin:14px 0 0;line-height:1.5">💡 Sau khi bé bấm "Đổi", bố/mẹ sẽ trao quà thật trong tuần. Quà chờ trao sẽ hiện ở khung vàng phía trên.</p>` + bgSceneHTML(t.id);
  root.querySelector('#back').onclick=()=>{state.screen='dashboard';render()};
  root.querySelector('#parentBtn').onclick=()=>{state.screen='parentLogin';render()};
  root.querySelectorAll('.redeem-btn').forEach(b=>b.onclick=()=>{
    const r=REWARDS.find(x=>x.id===b.dataset.id);
    if(getCoins(p)<r.cost)return;
    if(confirm(`Đổi "${r.name}" với ${r.cost} 🪙?\n\nVí xu hiện tại: ${getCoins(p)} 🪙\nSau khi đổi: ${getCoins(p)-r.cost} 🪙\n\nBố/mẹ sẽ trao quà thật trong tuần.`)){
      addRedemption(p,r.id);
      alert(`🎉 Đã đặt quà "${r.name}"!\n\nĐợi bố/mẹ trao quà nhé. Quà chờ trao hiện ở khung vàng phía trên.`);
      render();
    }
  });
}

function renderKidLogin(){
  const p=state.profile,info=PROFILES[p],t=THEMES[info.theme];
  applyBodyTheme(t.id);
  const correctPin=getKidPin(p);
  const isVy=p==='vy';
  const avatar=isVy?princessChar('#92400E','#EC4899',96):blockyChar('#FBBF24','#3B82F6','#1E40AF',82);
  const heroBg=isVy?'linear-gradient(135deg,#FFE0F0,#FFB7DC,#FF6FB5)':'linear-gradient(135deg,#DBEAFE,#93C5FD,#3B82F6)';
  const accentColor=isVy?'#BE185D':'#1E40AF';
  const dotColor=isVy?'#EC4899':'#3B82F6';
  const greeting=isVy?'Chào công chúa Vy! 👑':'Chào kỹ sư Lâm! 🎮';
  const subText=isVy?'Nhập mã bí mật của riêng con nha':'Nhập mã của riêng con để vào nhé';
  // 4 ô hiển thị PIN
  const dots=()=>{const v=state.kidPinInput||'';return [0,1,2,3].map(i=>`<div class="pindot" style="background:${i<v.length?dotColor:'rgba(255,255,255,.5)'};border:3px solid ${dotColor}"></div>`).join('')};
  const numpadKeys=[1,2,3,4,5,6,7,8,9,'X',0,'OK'];
  const numpad=numpadKeys.map(k=>{
    const isAct=k==='OK',isDel=k==='X';
    const bg=isAct?(isVy?'linear-gradient(135deg,#10B981,#059669)':'linear-gradient(135deg,#10B981,#059669)'):isDel?'linear-gradient(135deg,#F59E0B,#D97706)':'rgba(255,255,255,.95)';
    const fg=isAct||isDel?'white':accentColor;
    const label=isAct?'✓':isDel?'⌫':k;
    return `<button class="numkey" data-k="${k}" style="background:${bg};color:${fg};border:none;border-radius:20px;padding:14px;font-size:26px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 rgba(0,0,0,.12),0 6px 12px rgba(0,0,0,.08);transition:transform .08s,box-shadow .08s;min-height:60px">${label}</button>`;
  }).join('');
  root.innerHTML=`<div class="bar">
    <div class="btn gray" id="back">← Đổi bạn</div>
    <div class="namebar"><p class="nm">🔐 Đăng nhập</p><p class="gr">PIN của riêng con</p></div>
    <span></span>
  </div>
  <div style="background:${heroBg};border-radius:24px;padding:22px 18px;text-align:center;box-shadow:0 12px 32px rgba(0,0,0,.12);margin-bottom:14px;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(255,255,255,.4) 2px,transparent 3px),radial-gradient(circle at 80% 70%,rgba(255,255,255,.3) 3px,transparent 4px),radial-gradient(circle at 50% 90%,rgba(255,255,255,.35) 2px,transparent 3px);background-size:80px 80px,120px 120px,60px 60px;pointer-events:none"></div>
    <div class="bouncer" style="display:flex;justify-content:center;position:relative">${avatar}</div>
    <h2 style="margin:10px 0 4px;color:${accentColor};font-weight:600;font-size:20px;position:relative">${greeting}</h2>
    <p style="margin:0;font-size:13px;color:${accentColor};opacity:.85;position:relative">${subText}</p>
    <div style="display:flex;gap:14px;justify-content:center;margin:18px 0 4px;position:relative">${dots()}</div>
    <p id="pinErr" style="font-size:12px;color:#DC2626;margin:8px 0 0;min-height:18px;position:relative;font-weight:500"></p>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:0 auto">${numpad}</div>
  <p style="font-size:10px;color:#6B7280;text-align:center;margin:14px 0 0">💡 Bố/mẹ có thể đổi PIN trong khu vực Bố/Mẹ</p>` + bgSceneHTML(t.id);
  root.querySelector('#back').onclick=()=>{state.profile=null;state.kidPinInput='';state.screen='select';render()};
  root.querySelectorAll('.numkey').forEach(b=>{
    b.onclick=()=>{
      const k=b.dataset.k;
      state.kidPinInput=state.kidPinInput||'';
      if(k==='X'){state.kidPinInput=state.kidPinInput.slice(0,-1)}
      else if(k==='OK'){
        if(state.kidPinInput===correctPin){state.kidPinInput='';state.screen='level';render()}
        else{root.querySelector('#pinErr').textContent='❌ Sai mã rồi! Thử lại nhé.';state.kidPinInput='';setTimeout(render,800)}
        return;
      }
      else if(state.kidPinInput.length<4){state.kidPinInput+=k;
        // Auto-submit khi đủ 4 ký tự
        if(state.kidPinInput.length===4){
          if(state.kidPinInput===correctPin){setTimeout(()=>{state.kidPinInput='';state.screen='level';render()},150);return}
          else{setTimeout(()=>{root.querySelector('#pinErr').textContent='❌ Sai mã rồi! Thử lại nhé.';state.kidPinInput='';render()},400)}
        }
      }
      render();
    };
  });
}

function renderParent(){
  applyBodyTheme(null);
  // Render full dashboard cho bố/mẹ — gộp 2 profile
  const profiles=['vy','lam'];
  const WINDOWS=[3,7,10,15,30];
  const subjLabel={math:'Toán',english:'Anh',vietnamese:'Việt'};
  // Bảng so sánh tiến độ theo 5 cửa sổ
  const progressTable=()=>{
    const accColor=acc=>acc>=85?'#10B981':acc>=70?'#3B82F6':acc>=50?'#F59E0B':'#EF4444';
    const accLabel=acc=>acc>=85?'Xuất sắc':acc>=70?'Tốt':acc>=50?'Khá':'Cần luyện thêm';
    const kidTable=p=>{
      const info=PROFILES[p];
      const cards=WINDOWS.map(d=>{
        const a=analyzeProgress(p,d);
        if(a.total===0)return `<div style="background:white;border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border-left:3px solid #D1D5DB"><span style="font-weight:600;color:#374151;min-width:40px">${d} ngày</span><span style="color:#9CA3AF;font-style:italic;font-size:11px">Chưa có dữ liệu</span></div>`;
        const subjStr=['math','english','vietnamese'].map(s=>{const x=a.bySubj[s];if(x.t===0)return '';return `<span style="color:${accColor(x.acc)};font-weight:600">${subjLabel[s]} ${x.acc}%</span>`}).filter(Boolean).join(' · ');
        const weakStr=a.weakest.length?a.weakest.map(t=>`${t.tn} (${Math.round(t.c/(t.c+t.w)*100)}%)`).join(', '):'';
        return `<div style="background:white;border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid ${accColor(a.acc)}">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <span style="font-weight:600;color:#374151;font-size:13px">${d} ngày</span>
            <span style="background:${accColor(a.acc)};color:white;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600">${a.acc}% ${accLabel(a.acc)}</span>
            <span style="font-size:10px;color:#6B7280">${a.sessions} bài · <span style="color:#10B981;font-weight:600">${a.correct}✓</span> · <span style="color:#EF4444;font-weight:600">${a.wrong}✗</span></span>
          </div>
          ${subjStr?`<div style="font-size:10px;margin-top:2px">${subjStr}</div>`:''}
          ${weakStr?`<div style="font-size:10px;color:#92400E;margin-top:2px">⚠️ Yếu nhất: ${weakStr}</div>`:''}
        </div>`;
      }).join('');
      const totalAttempts=getAttempts(p).length;
      const a30=analyzeProgress(p,30);
      let comment='Chưa đủ dữ liệu để nhận xét — bé cần làm thêm bài.';
      if(a30.total>=10){
        const subjs=['math','english','vietnamese'].filter(s=>a30.bySubj[s].t>=3).map(s=>({s,acc:a30.bySubj[s].acc}));
        if(subjs.length){
          const best=subjs.slice().sort((a,b)=>b.acc-a.acc)[0];
          const worst=subjs.slice().sort((a,b)=>a.acc-b.acc)[0];
          comment=a30.acc>=80?`✅ Bé học rất tốt (${a30.acc}%). Mạnh nhất: ${subjLabel[best.s]} (${best.acc}%).`:a30.acc>=60?`👍 Bé tiến bộ ổn (${a30.acc}%). Mạnh: ${subjLabel[best.s]} (${best.acc}%). Cần luyện: ${subjLabel[worst.s]} (${worst.acc}%).`:`⚠️ Bé cần củng cố nền tảng (${a30.acc}%). Yếu nhất: ${subjLabel[worst.s]} (${worst.acc}%).`;
          if(a30.weakest.length)comment+=` Đề xuất ôn: "${a30.weakest[0].tn}".`;

  const stepsHtml=ex.steps.slice(0,state.stepShown).map((s,i)=>`<div class="step"><span class="sn">${i+1}</span><p>${s}</p></div>`).join('');
  const visual=ex.kind==='clock'?clockSVG(ex.time,200):(ex.kind==='fraction'?fracEqVisual(ex.f1.n,ex.f1.d,ex.op,ex.f2.n,ex.f2.d,80):(ex.kind==='addsub'?addSubVisual(ex.n1,ex.op,ex.n2):''));
  root.innerHTML=`<div class="bar">
    <div class="btn gray" id="back">← Quay</div>
    <div class="namebar"><p class="nm">${top.t}</p><p class="gr">Ví dụ mẫu</p></div>
    <span></span>

  <div class="panel">${visual}<div class="qrow"><p class="qp" style="margin:0">${ex.p}</p>${top.lang?`<button class="speaker" id="spk">🔊</button>`:''}</div>${stepsHtml}${allShown?`<div style="text-align:center;margin-top:10px"><span class="answer-box">✓ Đáp số: ${ex.a}</span></div>`:''}</div>
  <div class="lesson-actions">
    ${!allShown?`<button class="btn-skip" id="skip">Hiện tất cả</button>`:''}
    ${allShown?`<button class="btn-go" id="go">▶ Mình hiểu rồi — Làm bài!</button>`:''}
  </div>`;
  root.querySelector('#back').onclick=()=>{state.screen='topics';render()};
  const spk=root.querySelector('#spk');if(spk)spk.onclick=e=>speak(ex.p,top.lang||'vi-VN',e.currentTarget);
  if(!allShown){const sk=root.querySelector('#skip');if(sk)sk.onclick=()=>{state.stepShown=total;render()};setTimeout(()=>{if(state.screen==='lesson'&&state.stepShown<total){state.stepShown++;render()}},1500)}
  if(allShown){const go=root.querySelector('#go');if(go)go.onclick=()=>{state.questions=buildQuestions(top);state.qIndex=0;state.score=0;state.correct=0;state.wrong=0;state.points=0;state.wrongQs=[];state.picked=null;state.times=[];state.qStartTime=Date.now();state.screen='quiz';render()}}
}

function renderQuiz(){
  const q=state.questions[state.qIndex];const total=state.questions.length;const pct=((state.qIndex+1)/total)*100;
  const visual=(q.kind==='clock'?clockSVG(q.time,200):(q.kind==='fraction'?fracEqVisual(q.f1.n,q.f1.d,q.op,q.f2.n,q.f2.d,80):(q.kind==='addsub'?addSubVisual(q.n1,q.op,q.n2):(q.emoji?`<span class="qe">${q.emoji}</span>`:''))))+`<div class="qrow"><p class="qp" style="margin:0">${q.prompt}</p>${state.topic.lang||q.speakLang?`<button class="speaker" id="spk">🔊</button>`:''}</div>`;
  const choices=q.choices.map((c,i)=>{
    let cls='choice';
    if(state.picked!==null){if(i===q.answerIndex)cls+=' correct';else if(i===state.picked)cls+=' wrong';else cls+=' dim'}
    if(state.picked!==null)cls+=' disabled';
    const mark=state.picked!==null?(i===q.answerIndex?' ✓':(i===state.picked?' ✗':'')):'';
    return `<button class="${cls}" data-i="${i}" ${state.picked!==null?'disabled':''}>${c}${mark}</button>`;
  }).join('');
  const showExpl=state.picked!==null&&state.picked!==q.answerIndex;
  const exBox=showExpl&&q.explanation?`<div class="explain"><p class="t">💡 Giải thích</p><p class="b">${q.explanation}</p></div>`:'';
  root.innerHTML=`<div class="bar">
    <div class="btn gray" id="exit">← Thoát</div>
    <div class="namebar"><p class="nm">Câu ${state.qIndex+1} / ${total}</p></div>
    <span style="color:#D97706;font-weight:600;display:inline-flex;align-items:center;gap:4px;font-size:13px">⭐ ${state.points} đ${state.level!=='basic'?' <span style="font-size:9px;background:#EF4444;color:white;padding:1px 5px;border-radius:99px;font-weight:600">×2</span>':''}</span>
  </div>
  <div class="progress"><div style="width:${pct}%"></div></div>
  <div class="panel">${visual}<div class="choices">${choices}</div>${exBox}</div>`;
  root.querySelector('#exit').onclick=()=>{window.speechSynthesis&&window.speechSynthesis.cancel();state.screen='topics';render()};
  const spk=root.querySelector('#spk');if(spk)spk.onclick=e=>speak(q.speak||q.prompt,q.speakLang||state.topic.lang||'vi-VN',e.currentTarget);
  if(state.picked===null)root.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>pick(+b.dataset.i));
}

function pick(i){
  if(state.picked!==null)return;
  state.picked=i;
  const ms=Date.now()-(state.qStartTime||Date.now());
  state.times.push(ms);
  const q=state.questions[state.qIndex];const correct=i===q.answerIndex;
  const isHard=state.level!=='basic'; // advanced + exam = câu khó
  const ptsThis=correct?(isHard?2:1):-1;
  state.points+=ptsThis;
  if(correct){state.correct++;state.score++;celebrate()}else{state.wrong++;state.wrongQs.push({q,picked:i})}
  render();
  setTimeout(()=>{
    if(state.qIndex===state.questions.length-1){
      const p=state.profile;
      const replayed=isTopicDoneToday(p,state.topic.id); // bài đã làm hôm nay → không cộng xu
      const net=replayed?0:state.points; // tổng điểm thực sự (đã tính khó/dễ)
      const oldBal=getCoins(p);
      const newCoins=replayed?oldBal:Math.max(0,oldBal+net);
      const realDelta=newCoins-oldBal;
      if(!replayed)setCoins(p,newCoins);
      const newTotal=getTotalCorrect(p)+state.correct;setTotalCorrect(p,newTotal);
      const avgMs=state.times.length>0?Math.round(state.times.reduce((a,b)=>a+b,0)/state.times.length):0;
      const sus=avgMs>0&&avgMs<(p==='vy'?2500:1800)&&state.correct/state.questions.length>=0.85; // Vy < 2.5s/câu hoặc Lâm < 1.8s/câu + accuracy ≥85% → khả nghi
      logAttempt(p,{d:new Date().toISOString().slice(0,10),s:state.subj,tid:state.topic.id,tn:state.topic.t,c:state.correct,w:state.wrong,pts:state.points,lv:state.level,ms:avgMs,sus,t:Date.now()});
      const newStreak=checkInToday(p);
      state.newAch=checkUnlocks(p);
      state.lastResult={title:state.topic.t,correct:state.correct,wrong:state.wrong,total:state.questions.length,points:state.points,isHard,replayed,coinsNet:net,coinsReal:realDelta,newBal:newCoins,streak:newStreak,floored:net!==realDelta,wrongQs:state.wrongQs.slice(),avgMs,sus};
      // Mark topic done today
      const today=new Date().toISOString().slice(0,10);
      const doneKey='done_'+p+'_'+today;
      const doneSet=LS.get(doneKey,[]);
      if(!doneSet.includes(state.topic.id)){doneSet.push(state.topic.id);LS.set(doneKey,doneSet)}
      state.screen='result';render();
    }else{state.qIndex++;state.picked=null;state.qStartTime=Date.now();render()}
  },correct?1100:2200);
}

function celebrate(){
  const t=THEMES[PROFILES[state.profile].theme];
  const div=document.createElement('div');div.className='celebrate';
  for(let k=0;k<18;k++){const ang=(k/18)*Math.PI*2,d=120+Math.random()*80;const p=document.createElement('span');p.className=`particle ${t.shape}`;p.style.background=t.particles[k%t.particles.length];p.style.setProperty('--x',Math.cos(ang)*d+'px');p.style.setProperty('--y',Math.sin(ang)*d+'px');div.appendChild(p)}
  const sti=t.stickers[Math.floor(Math.random()*t.stickers.length)];
  const pra=t.praises[Math.floor(Math.random()*t.praises.length)];
  const s=document.createElement('div');s.className=`sticker ${t.id}`;s.innerHTML=`<span class="se">${sti}</span><p class="st">${pra}</p>`;
  div.appendChild(s);document.body.appendChild(div);
  setTimeout(()=>div.remove(),1300);
}

function renderResult(){
  const r=state.lastResult,ratio=r.correct/r.total;
  const e=ratio===1?'🏆':ratio>=.5?'🎈':'🌻';
  const m=ratio===1?'Hoàn hảo! Bé đúng tất cả!':ratio>=.7?'Rất giỏi!':ratio>=.4?'Khá lắm!':'Đừng buồn nhé!';
  const net=r.coinsNet||0,real=r.coinsReal||0;
  const pp=r.isHard?2:1;
  const breakdown=`Đúng ${r.correct} × ${pp}đ = +${r.correct*pp} · Sai ${r.wrong} × −1đ = −${r.wrong}`;
  let coinBox='';
  if(r.replayed){
    coinBox=`<div class="points-earn" style="background:linear-gradient(135deg,#7C3AED,#5B21B6)"><span class="big">🔄 Làm lại</span><span class="sm">${breakdown}<br>Bài này đã làm hôm nay rồi — không cộng xu nhé!<br>Ví giữ nguyên: ${r.newBal} 🪙 · 🔥 ${r.streak}</span></div>`;
  }
  else if(net>0)coinBox=`<div class="points-earn" style="background:linear-gradient(135deg,#FBBF24,#F59E0B)"><span class="big">+${real} 🪙</span><span class="sm">${breakdown}${r.floored?' · Sàn 0':''}<br>Ví: ${r.newBal} 🪙 · 🔥 ${r.streak}${r.isHard?' · 🔥 Câu khó ×2':''}</span></div>`;
  else if(net===0)coinBox=`<div class="points-earn" style="background:linear-gradient(135deg,#9CA3AF,#6B7280)"><span class="big">±0 🪙</span><span class="sm">${breakdown}<br>Ví: ${r.newBal} 🪙 · 🔥 ${r.streak}</span></div>`;
  else coinBox=`<div class="points-earn" style="background:linear-gradient(135deg,#F87171,#EF4444)"><span class="big">${real} 🪙</span><span class="sm">${breakdown}${r.floored?' · Sàn 0':''}<br>Ví: ${r.newBal} 🪙 · 🔥 ${r.streak}</span></div>`;
  root.innerHTML=`<div class="result">
    <span class="e">${e}</span>
    <h3 style="color:#6B46C1;font-weight:600;margin:0">${r.title}</h3>
    <p class="s">${r.correct} / ${r.total}</p>
    <p class="m">${m}</p>
    ${r.sus?`<div style="background:#FEF2F2;border:2px solid #DC2626;border-radius:14px;padding:12px;margin:10px 0;text-align:left"><p style="margin:0;font-size:13px;font-weight:600;color:#991B1B">🚨 Có vẻ bé làm bài quá nhanh!</p><p style="margin:4px 0 0;font-size:12px;color:#7F1D1D;line-height:1.5">Trung bình ${(r.avgMs/1000).toFixed(1)}s/câu — bố/mẹ kiểm tra xem có phải đúng bé đang làm không nhé.</p></div>`:''}
    ${r.wrong>0?`<br><button class="btn-go" id="rev" style="background:linear-gradient(90deg,#FB923C,#F59E0B);margin-bottom:8px">📖 Xem lại ${r.wrong} bài sai</button>`:''}
    <br><button class="btn-go" id="cont">Tiếp tục 🚀</button>
  </div>`;
  root.querySelector('#cont').onclick=()=>{state.topic=null;state.screen='topics';render()};
  const revBtn=root.querySelector('#rev');if(revBtn)revBtn.onclick=()=>{state.screen='review';render()};
  if(state.newAch&&state.newAch.length)setTimeout(showAchModal,500);
}

function showAchModal(){
  const newly=state.newAch;
  const list=newly.map(a=>`<div class="ach-item"><span class="ae">${a.e}</span><div><p class="at">${a.t}</p><p class="ad">${a.d}</p></div></div>`).join('');
  const ov=document.createElement('div');ov.className='modal-bg';
  ov.innerHTML=`<div class="ach-modal"><h2>🎊 Mở khoá huy hiệu mới!</h2>${list}<button class="closebtn" id="cls">Tuyệt! 🎉</button></div>`;
  ov.onclick=e=>{if(e.target===ov||e.target.id==='cls'){state.newAch=[];ov.remove()}};
  document.body.appendChild(ov);
}

function renderReview(){
  const r=state.lastResult;
  if(!r||!r.wrongQs||r.wrongQs.length===0){state.screen='result';render();return}
  const p=state.profile,info=PROFILES[p],t=THEMES[info.theme];
  applyBodyTheme(t.id);
  const items=r.wrongQs.map((wq,idx)=>{
    const q=wq.q;
    const yourAns=q.choices[wq.picked];
    const rightAns=q.choices[q.answerIndex];
    const expl=q.explanation||'(Chủ đề này chưa có giải thích chi tiết — bố/mẹ giải nhé!)';
    return `<div style="background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 4px 12px rgba(0,0,0,.06);border-left:5px solid #EF4444">
      <p style="margin:0 0 8px;font-size:11px;color:#9CA3AF;font-weight:600">CÂU ${idx+1}</p>
      <p style="margin:0 0 10px;font-size:14px;font-weight:600;color:#1F2937;line-height:1.5">${q.prompt}</p>
      <div style="background:#FEF2F2;border-radius:10px;padding:8px 10px;margin-bottom:6px"><span style="font-size:11px;color:#991B1B;font-weight:600">✗ Bé chọn:</span> <span style="font-size:13px;color:#7F1D1D">${yourAns}</span></div>
      <div style="background:#ECFDF5;border-radius:10px;padding:8px 10px;margin-bottom:8px"><span style="font-size:11px;color:#065F46;font-weight:600">✓ Đáp án đúng:</span> <span style="font-size:13px;color:#064E3B;font-weight:600">${rightAns}</span></div>
      <div style="background:#FEF3C7;border-radius:10px;padding:10px;margin-top:6px"><p style="margin:0 0 4px;font-size:11px;font-weight:600;color:#92400E">💡 Giải thích</p><p style="margin:0;font-size:12px;color:#78350F;line-height:1.5">${expl}</p></div>
    </div>`;
  }).join('');
  root.innerHTML=`<div class="bar">
    <div class="btn gray" id="back">← Kết quả</div>
    <div class="namebar"><p class="nm">📖 Xem lại bài sai</p><p class="gr">${r.title} · ${r.wrongQs.length} câu</p></div>
    <span></span>
  </div>
  <div style="background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:14px;padding:12px 14px;margin-bottom:12px;text-align:center">
    <p style="margin:0;font-size:13px;color:#78350F;line-height:1.5">Cùng đọc giải thích để lần sau làm đúng nhé! Mai mới được làm lại bài này.</p>
  </div>
  ${items}
  <button id="done" style="width:100%;background:linear-gradient(90deg,#10B981,#059669);color:white;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px">✓ Đã hiểu — về Dashboard</button>` + bgSceneHTML(t.id);
  root.querySelector('#back').onclick=()=>{state.screen='result';render()};
  root.querySelector('#done').onclick=()=>{state.topic=null;state.screen='dashboard';render()};
}

render();
})();
</script>
</body>
</html>
